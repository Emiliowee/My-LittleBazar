name: Build installer

# Compila y PUBLICA el instalador de Windows en un runner con privilegios
# (windows-latest), evitando el muro de symlinks de winCodeSign de las máquinas
# locales sin Modo de programador. Al empujar un tag vX.Y.Z, electron-builder sube
# a la Release: el .exe + latest.yml + .blockmap — lo que electron-updater necesita
# para que la app instalada se ACTUALICE SOLA. También se puede lanzar a mano.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar y publicar instalador (+ metadatos de auto-update)
        run: npm run build -- --publish always
        env:
          # Token del propio Actions para publicar en Releases (auto-update).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No firmamos (sin certificado); evita que electron-builder intente firmar.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Subir instalador como artefacto (respaldo)
        uses: actions/upload-artifact@v4
        with:
          name: My-Little-Bazar-Setup
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
